# Transitive crates (e.g. toml_datetime) declare edition2024; Cargo must be recent enough
# to parse those manifests (your error showed Cargo 1.84 — too old).
#
# From repo root run once:
#   rustup update stable
#   cargo --version
#
# You should see Cargo ≥ 1.85 (newer is fine). If `cargo --version` stays old, try:
#   rustup self update && rustup update stable
#
[toolchain]
channel = "stable"
profile = "minimal"
